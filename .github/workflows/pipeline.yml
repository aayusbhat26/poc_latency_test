name: End-to-End Medallion Pipeline

on:
  workflow_dispatch: # Run manually

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          pip install pyspark==3.5.0 delta-spark==3.1.0 huggingface_hub
          
      - name: Execute Master Pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python main.py